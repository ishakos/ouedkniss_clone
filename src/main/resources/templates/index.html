

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>

<body>

<h1>Ouedkniss</h1>

<div th:replace="fragments/header :: header"></div>


<hr>

<h2>Products</h2>

<div th:each="p : ${products}">
    <img  th:src="@{'/images/' + ${p.image}}" width="150">
    <h3 th:text="${p.title}"></h3>
    <h5 th:text="${p.description}"></h5>
    <p th:text="${p.price}"></p>
    <p>Seller: <span th:text="${p.user.username}"></span></p>

    <hr>
</div>


</body>
</html>
