<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title th:text="${product.title}">Product Details</title>

  <style>
    body { font-family: Arial; background: #f2f2f2; }
    .container {
        width: 900px;
        margin: 30px auto;
        padding: 25px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 0 10px #ccc;
    }
    .btn {
        display: inline-block;
        padding: 10px 15px;
        color: white;
        background: #28a745;
        text-decoration: none;
        border-radius: 5px;
    }
    .btn:hover { background: #218838; }
    .product-img {
        width: 100%;
        max-height: 350px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    .disabled {
        color: gray;
        font-style: italic;
    }
  </style>
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">

  <h2 th:text="${product.title}"></h2>

  <!-- 🔥 Correct image loading -->
  <img th:src="@{/images/{img}(img=${product.image})}" class="product-img" width="300">

  <p><strong>Price:</strong> <span th:text="${product.price}"></span> DA</p>
  <p><strong>Description:</strong> <span th:text="${product.description}"></span></p>

  <hr>

  <!-- 🔥 Seller Info -->
  <h3>Seller Information</h3>
  <p><strong>Name:</strong> <span th:text="${product.user.name}"></span></p>
  <p><strong>Email:</strong> <span th:text="${product.user.email}"></span></p>
  <p><strong>Phone:</strong> <span th:text="${product.user.phone}"></span></p>

  <hr>

  <!-- NOT LOGGED IN -->
  <div th:if="${session.user == null}">
    <a class="btn" href="/login">Log in to contact seller</a>
  </div>

  <!-- LOGGED IN -->
  <div th:if="${session.user != null}">

    <!-- Owner sees their own product -->
    <div th:if="${session.user.id == product.user.id}">
      <p class="disabled">This is your product.</p>
    </div>

    <!-- Other users can message the seller -->
    <div th:if="${session.user.id != product.user.id}">
      <a th:href="@{/messages/start/{id}(id=${product.id})}" class="btn">
        Contact Seller
      </a>
    </div>

  </div>

</div>

</body>
</html>
