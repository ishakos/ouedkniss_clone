<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 0;
            margin: 0;
        }
        .chat-container {
            width: 60%;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px #ccc;
        }
        .messages-box {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #fafafa;
        }
        .msg {
            padding: 8px 12px;
            margin: 10px 0;
            max-width: 70%;
            border-radius: 8px;
        }
        .me {
            background: #d1ffd1;
            margin-left: auto;
        }
        .them {
            background: #cde1ff;
            margin-right: auto;
        }
        .send-box {
            display: flex;
        }
        .send-box input {
            flex: 1;
            padding: 12px;
        }
        .send-box button {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 12px 20px;
        }
        a.back {
            text-decoration: none;
            display: inline-block;
            margin-bottom: 15px;
            color: #333;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<div th:replace="fragments/header :: header"></div>

<div class="chat-container">

    <a class="back" href="/messages">← Back to Conversations</a>

    <!-- Messages -->
    <div class="messages-box" id="msgBox">
        <div th:each="m : ${messages}"
             th:classappend="${m.senderId == session.user.id} ? 'msg me' : 'msg them'">

            <p th:text="${m.content}"></p>
            <small th:text="${m.timestamp}"></small>
        </div>
    </div>

    <!-- Send form -->
    <form method="post" th:action="@{/messages/send}" class="send-box">
        <input type="hidden" name="conversationId" th:value="${conversationId}">
        <input type="text" name="content" placeholder="Type a message..." required>
        <button type="submit">Send</button>
    </form>
</div>

<script>
    let box = document.getElementById("msgBox");
    box.scrollTop = box.scrollHeight;
</script>

</body>
</html>
