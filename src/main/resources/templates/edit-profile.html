<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>
  <style>
    body {
        font-family: Arial;
        background: #f2f2f2;
    }
    .container {
        width: 400px;
        margin: 70px auto;
        padding: 25px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px #ccc;
    }
    input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ddd;
    }
    button {
        width: 100%;
        padding: 12px;
        background: #007bff;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #0069d9;
    }
    .error {
        color: red;
        text-align: center;
    }
    .success {
        color: green;
        text-align: center;
    }
    a.small {
        display: block;
        margin-top: 12px;
        text-align: center;
        color: #007bff;
    }
  </style>
</head>

<body>

<!-- Header -->
<div th:replace="fragments/header :: header"></div>

<div class="container">
  <h2>Edit Profile</h2>

  <!-- Success message -->
  <p class="success" th:if="${param.success}">
    Profile updated successfully.
  </p>

  <!-- Error message -->
  <p class="error" th:if="${param.error}">
    Invalid phone format.
  </p>

  <form th:action="@{/profile/update}" method="post">

    <input type="text" name="name"
           th:value="${user.name}"
           minlength="3" required
           placeholder="Full Name">

    <input type="email" name="email"
           th:value="${user.email}"
           required placeholder="Email">

    <input type="text" name="phone"
           th:value="${user.phone}"
           required placeholder="07XXXXXXXX"
           pattern="0[567][0-9]{8}">

    <input type="password" name="password"
           placeholder="New Password (optional)">

    <button type="submit">Save Changes</button>
  </form>

</div>

</body>
</html>
